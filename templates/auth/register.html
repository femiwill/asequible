{% extends 'base.html' %}
{% block title %}Register — {{ site_name }}{% endblock %}

{% block content %}
<section class="section-lg">
    <div class="container" style="max-width:440px">
        <div class="text-center mb-4">
            <h2 style="font-size:1.8rem">Create account.</h2>
            <p style="font-size:0.95rem">Join {{ site_name }} for faster checkout.</p>
        </div>

        <div class="card-white p-4">
            <form method="POST">
                <div class="mb-3"><label class="form-label">Full Name *</label><input type="text" name="name" class="form-control" autocomplete="name" required value="{{ request.form.get('name', '') }}"></div>
                <div class="mb-3"><label class="form-label">Phone Number *</label><input type="tel" name="phone" class="form-control" autocomplete="tel" inputmode="tel" placeholder="+234..." required value="{{ request.form.get('phone', '') }}"></div>
                <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" autocomplete="email" inputmode="email" value="{{ request.form.get('email', '') }}"></div>
                <div class="mb-3"><label class="form-label">Password *</label><div class="password-wrap"><input type="password" name="password" class="form-control" autocomplete="new-password" minlength="6" required placeholder="Min 6 characters"><button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="Toggle password"><i class="bi bi-eye"></i></button></div></div>
                <div class="mb-4"><label class="form-label">Confirm Password *</label><div class="password-wrap"><input type="password" name="confirm_password" class="form-control" autocomplete="new-password" minlength="6" required><button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="Toggle password"><i class="bi bi-eye"></i></button></div></div>
                <button type="submit" class="btn btn-dark-apple btn-lg w-100">Create Account</button>
            </form>

            <div class="d-flex align-items-center my-3">
                <hr style="flex:1;border-color:rgba(0,0,0,0.1)">
                <span style="padding:0 12px;font-size:0.8rem;color:var(--gray)">or</span>
                <hr style="flex:1;border-color:rgba(0,0,0,0.1)">
            </div>

            <a href="{{ url_for('google_login') }}" class="btn btn-lg w-100" style="background:#fff;border:1px solid #dadce0;color:#3c4043;font-weight:500;font-size:0.95rem;display:flex;align-items:center;justify-content:center;gap:10px;border-radius:12px;padding:10px 16px;">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign up with Google
            </a>
        </div>

        <p class="text-center mt-3" style="font-size:0.85rem;color:var(--gray)">
            Already have an account? <a href="/login" style="color:var(--accent);font-weight:500">Sign in</a>
        </p>
    </div>
</section>
{% endblock %}
