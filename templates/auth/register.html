{% extends 'base.html' %}
{% block title %}Register — {{ site_name }}{% endblock %}

{% block content %}
<section class="py-5" style="background:var(--cream)">
    <div class="container" style="max-width:500px">
        <div class="text-center mb-4 reveal">
            <h2 class="fw-bold"><i class="bi bi-person-plus me-2"></i>Create Account</h2>
            <p>Join {{ site_name }} for faster checkout and order tracking.</p>
        </div>

        <div class="card border-0 card-elevated reveal">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name *</label>
                        <input type="text" name="name" class="form-control" required value="{{ request.form.get('name', '') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number *</label>
                        <input type="tel" name="phone" class="form-control" placeholder="+234..." required value="{{ request.form.get('phone', '') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ request.form.get('email', '') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password *</label>
                        <input type="password" name="password" class="form-control" minlength="6" required placeholder="At least 6 characters">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm Password *</label>
                        <input type="password" name="confirm_password" class="form-control" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-brand btn-lg w-100">
                        <i class="bi bi-check-circle me-2"></i>Create Account
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center mt-3 small" style="color:var(--text-muted)">
            Already have an account? <a href="/login" class="fw-semibold" style="color:var(--brown)">Log in</a>
        </p>
    </div>
</section>
{% endblock %}
